spring.application.name=ERPMotos

# Datasource MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/erp_motos_db?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true

spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
# Respeta los nombres exactos definidos en la BD
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Puerto del servidor
server.port=8081

# Permitir orígenes cruzados (CORS para el frontend)
spring.web.cors.allowed-origins=*
