  <title>ERP Motos — Proveedores</title>
  <link rel="stylesheet" href="CSS/style.css">
  <style>
    :root { --modulo-color: var(--proveedor-color); }
    .panel-header h2 { color: var(--proveedor-color); }
    .topbar { border-bottom: 3px solid var(--proveedor-color); }
    .tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .tab { padding:8px 18px; border-radius:var(--radio); border:2px solid #ddd; background:#fff; cursor:pointer; font-size:.88rem; font-weight:600; transition:all var(--transicion); }
    .tab.activo { border-color:var(--proveedor-color); background:var(--proveedor-color); color:#fff; }
    .tab:hover:not(.activo) { border-color:var(--proveedor-color); color:var(--proveedor-color); }
    .seccion { display:none; }
    .seccion.activa { display:block; }
    .empleado-avatar {
      width:40px; height:40px; border-radius:50%;
      background:var(--proveedor-color); color:#fff;
      display:inline-flex; align-items:center; justify-content:center;
      font-weight:700; font-size:1rem;
    }
  </style>
</head>
